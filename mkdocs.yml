    - Parametric Consolidation: concepts/parametric-consolidation.md
    - Curriculum Agent: concepts/curriculum-agent.md
    - Executor Agent: concepts/executor-agent.md
    - ADPO: concepts/adpo.md
    - Test-Time Self-Evolution: concepts/test-time-self-evolution.md
