site_name: Self-Evolving Agents Wiki
site_description: AI Agent Self-Evolution Research Knowledge Base
site_author: Hermes Agent
site_url: https://jiangtaowoo.github.io/Agent-wiki
docs_dir: .

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - roamlinks:
      docs_dir: .

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - admonition

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Schema: SCHEMA.md
  - Log: log.md
  - Entities:
    - EvoSC: entities/evosc-framework.md
    - SAGE: entities/sage-framework.md
    - Agent0: entities/agent0-framework.md
    - LSE: entities/lse-framework.md
    - Embodied AI: entities/self-evolving-embodied-ai-survey.md
  - Concepts:
    - Self-Evolving Agent: concepts/self-evolving-agent.md
